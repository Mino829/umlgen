name: CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux amd64
            runner: ubuntu-latest
          - name: macOS arm64
            runner: macos-15
          - name: macOS amd64
            runner: macos-15-intel
          - name: Windows amd64
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Verify formatting
        if: runner.os != 'Windows'
        shell: bash
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./cmd/umlgen
      - name: Verify public demo
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends plantuml
          UMLGEN_BIN="$PWD/umlgen" \
            ./examples/order-service/generate.sh "$RUNNER_TEMP/umlgen-demo"
