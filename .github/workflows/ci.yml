name: CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux amd64
            runner: ubuntu-latest
          - name: macOS arm64
            runner: macos-15
          - name: macOS amd64
            runner: macos-15-intel
          - name: Windows amd64
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Verify formatting
        if: runner.os != 'Windows'
        shell: bash
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./cmd/umlgen
      - name: Test macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          install_dir="$RUNNER_TEMP/umlgen-installer-test"
          ./scripts/install-macos.sh \
            --version v0.3.0 \
            --install-dir "$install_dir" \
            --skip-path-update

          "$install_dir/umlgen" version
          "$install_dir/umlgen" class \
            testdata/java/compatibility/project \
            --output "$RUNNER_TEMP/macos-class-diagram.puml" \
            --quiet

          test -f "$RUNNER_TEMP/macos-class-diagram.puml"

          ./scripts/uninstall-macos.sh \
            --install-dir "$install_dir" \
            --skip-path-update

          test ! -e "$install_dir/umlgen"
      - name: Test Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP 'umlgen-installer-test'
          ./scripts/install-windows.ps1 `
            -Version v0.3.0 `
            -InstallDir $installDir `
            -InstallPlantUML `
            -SkipPathUpdate

          $env:Path = "$installDir;$env:Path"
          & "$installDir\umlgen.exe" version
          & "$installDir\umlgen.exe" class `
            testdata/java/compatibility/project `
            --format svg `
            --output "$env:RUNNER_TEMP/windows-class-diagram.puml" `
            --quiet

          if (-not (Test-Path "$env:RUNNER_TEMP/windows-class-diagram.puml")) {
            throw 'PlantUML output was not created.'
          }
          if (-not (Test-Path "$env:RUNNER_TEMP/windows-class-diagram.svg")) {
            throw 'SVG output was not created.'
          }

          ./scripts/uninstall-windows.ps1 `
            -InstallDir $installDir `
            -SkipPathUpdate `
            -Confirm:$false

          if (Test-Path $installDir) {
            throw 'The Windows uninstaller did not remove the install directory.'
          }
      - name: Verify public demo
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends plantuml
          UMLGEN_BIN="$PWD/umlgen" \
            ./examples/order-service/generate.sh "$RUNNER_TEMP/umlgen-demo"
